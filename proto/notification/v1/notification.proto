syntax = "proto3";

package notification.v1;
option go_package = "gen/notification/v1;notificationv1";

import "google/protobuf/timestamp.proto";

service NotificationService {
  rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsResponse);
  rpc GetUnreadCount(GetUnreadCountRequest) returns (UnreadCountResponse);
  rpc MarkAsRead(MarkAsReadRequest) returns (Notification);
  rpc MarkAllAsRead(MarkAllAsReadRequest) returns (UnreadCountResponse);
}

enum NotificationPriority {
  NOTIFICATION_PRIORITY_UNSPECIFIED = 0;
  NOTIFICATION_PRIORITY_INFO = 1;
  NOTIFICATION_PRIORITY_WARNING = 2;
  NOTIFICATION_PRIORITY_CRITICAL = 3;
}

message Notification {
  string id = 1;
  string recipient_user_id = 2;
  string type = 3;
  NotificationPriority priority = 4;
  string title = 5;
  string message = 6;
  string project_id = 7;
  string task_id = 8;
  string actor_user_id = 9;
  string action_url = 10;
  string source_event_type = 11;
  string source_event_key = 12;
  google.protobuf.Timestamp read_at = 13;
  google.protobuf.Timestamp created_at = 14;
}

message ListNotificationsRequest {
  int32 page_size = 1;
  string page_token = 2;
  bool unread_only = 3;
}

message ListNotificationsResponse {
  repeated Notification notifications = 1;
  string next_page_token = 2;
}

message GetUnreadCountRequest {}

message UnreadCountResponse {
  int32 count = 1;
}

message MarkAsReadRequest {
  string notification_id = 1;
}

message MarkAllAsReadRequest {}
