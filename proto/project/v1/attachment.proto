syntax = "proto3";

package project.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option go_package = "gen/project/v1;projectv1";



service AttachmentService {
    rpc AddAttachment(AddAttachmentRequest) returns (Attachment);
    rpc ListAttachments(ListAttachmentsRequest) returns (ListAttachmentsResponse);
    rpc DeleteAttachment(DeleteAttachmentRequest) returns (google.protobuf.Empty);
    rpc GetAttachment(GetAttachmentRequest) returns (Attachment);
}

message Attachment {
    string id = 1;
    string task_id = 2;
    string file_url = 3;
    AttachmentType type = 4;
    string file_name = 5;
    int64 file_size = 6;
    string uploaded_by = 7;
    google.protobuf.Timestamp uploaded_at = 8;
    string description = 9;
}

enum AttachmentType {
    ATTACHMENT_TYPE_UNSPECIFIED = 0;
    ATTACHMENT_TYPE_PHOTO = 1;
    ATTACHMENT_TYPE_DOCUMENT = 2;
    ATTACHMENT_TYPE_DRAWING = 3;
    ATTACHMENT_TYPE_OTHER = 4;
}

message AddAttachmentRequest {
    string task_id = 1;
    string file_url = 2;
    AttachmentType type = 3;
    string file_name = 4;
    int64 file_size = 5;
    string description = 6;
}

message ListAttachmentsRequest {
    string task_id = 1;
}

message ListAttachmentsResponse {
    repeated Attachment attachments = 1;
}

message DeleteAttachmentRequest {
    string id = 1;
}

message GetAttachmentRequest {
    string id = 1;
}

