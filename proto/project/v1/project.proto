syntax = "proto3";

package project.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option go_package = "gen/project/v1;projectv1";



service ProjectService {
    rpc CreateProject(CreateProjectRequest) returns (Project);
    rpc GetProject(GetProjectRequest) returns (Project);
    rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
    rpc UpdateProject(UpdateProjectRequest) returns (Project);
    rpc DeleteProject(DeleteProjectRequest) returns (google.protobuf.Empty);
    rpc ChangeProjectStatus(ChangeProjectStatusRequest) returns (Project);
    rpc GetUser(GetUserRequest) returns (User);
    rpc GetUserByEmail(GetUserByEmailRequest) returns (User);
    rpc FindUsers(FindUsersRequest) returns (FindUsersResponse);
}


message Project {
    string id = 1;
    string name = 2;
    string description = 3;
    string object_address = 4;
    string customer = 5;
    ProjectStatus status = 6;
    google.protobuf.Timestamp start_date = 7;
    google.protobuf.Timestamp end_date = 8;
    google.protobuf.Timestamp created_at = 9;
    google.protobuf.Timestamp updated_at = 10;
    string created_by = 11;
}

enum ProjectStatus {
    PROJECT_STATUS_UNSPECIFIED = 0;
    PROJECT_STATUS_ACTIVE = 1;
    PROJECT_STATUS_COMPLETED = 2;
    PROJECT_STATUS_ON_HOLD = 3;
    PROJECT_STATUS_CANCELLED = 4;
}


message CreateProjectRequest {
    string name = 1;
    string description = 2;
    string object_address = 3;
    string customer = 4;
    google.protobuf.Timestamp start_date = 5;
    google.protobuf.Timestamp end_date = 6;
}

message GetProjectRequest {
    string id = 1;
}

message ListProjectsRequest {
    ProjectStatus status_filter = 1;
    string manager_id = 2;
}

message ListProjectsResponse {
    repeated Project projects = 1;
    int32 total_count = 2;
}

message UpdateProjectRequest {
    string id = 1;
    string name = 2;
    string description = 3;
    string object_address = 4;
    string customer = 5;
    google.protobuf.Timestamp end_date = 6;
}

message ChangeProjectStatusRequest {
    string id = 1;
    ProjectStatus status = 2;
}

message DeleteProjectRequest {
    string id = 1;
}

message GetUserRequest {
    string id = 1;
}

message User {
    string id = 1;
    string full_name = 2;
    string email = 3;
    string role = 4;
    string department_id = 5;
}

message GetUserByEmailRequest {
    string email = 1;
}

message FindUsersRequest {
    string query = 1;
    int32 limit = 2;
}

message FindUsersResponse {
    repeated User users = 1;
}




