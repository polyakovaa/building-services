syntax = "proto3";

package analytics.v1;
option go_package = "gen/analytics/v1;analyticsv1";


enum AnalyticsSummaryScope {
    ANALYTICS_SUMMARY_SCOPE_UNSPECIFIED = 0;
    ANALYTICS_SUMMARY_SCOPE_PROJECTS = 1;
    ANALYTICS_SUMMARY_SCOPE_ORGANIZATION = 2;
}

service AnalyticsService {
    rpc GetDashboard(GetDashboardRequest) returns (DashboardResponse);
    rpc GetDepartmentWorkload(GetDepartmentWorkloadRequest) returns (DepartmentWorkloadResponse);
    rpc GetProjectTimelineControl(GetProjectTimelineRequest) returns (ProjectTimelineResponse);
    rpc GetTaskTrends(GetTaskTrendsRequest) returns (TaskTrendsResponse);
    rpc GetEmployeeProductivity(GetEmployeeProductivityRequest) returns (EmployeeProductivityResponse);
    rpc GetLaborPlanFact(GetLaborPlanFactRequest) returns (LaborPlanFactResponse);
    rpc GetDataFreshness(GetDataFreshnessRequest) returns (DataFreshnessResponse);
}


message GetDashboardRequest {
    string department_id = 1;
    string from_date = 2;
    string to_date = 3;
    string project_id = 4;
    string project_ids = 5;
}

message DashboardResponse {
    int32 active_projects = 1;
    int32 total_tasks = 2;
    int32 overdue_tasks = 3;
    double completion_rate = 4;
   
    repeated DepartmentWorkload department_workload = 5;
    repeated WeeklyTrend weekly_trend = 7;
    double on_time_rate = 8;
    DashboardPeriodComparison period_comparison = 9;
}

message DashboardPeriodComparison {
    int32 total_tasks_prev = 1;
    double total_tasks_delta_pct = 2;
    int32 overdue_tasks_prev = 3;
    double overdue_tasks_delta_pct = 4;
    double completion_rate_prev = 5;
    double completion_rate_delta_pct = 6;
    double on_time_rate_prev = 7;
    double on_time_rate_delta_pct = 8;
}

message GetDataFreshnessRequest {}

message DataFreshnessResponse {
    string last_event_at = 1;
    int32 tasks_count = 2;
}

message GetDepartmentWorkloadRequest {
    string department_id = 1;
    int32 days = 2;
    string project_id = 3;
    string from_date = 4;
    string to_date = 5;
    string project_ids = 6;
    AnalyticsSummaryScope summary_scope = 7;
}

message DepartmentWorkloadResponse {
    repeated DepartmentWorkload workloads = 1;
}

message DepartmentWorkload {
    string department_id = 1;
    string department_name = 2;
    int32 wip = 3;
    int32 completed = 4;
    int32 overdue = 5;
    double avg_cycle_time = 6;
    double productivity = 7;
    double on_time_rate = 8;
}

message GetProjectTimelineRequest {
    string project_id = 1;
    string department_id = 2;
    string project_ids = 3;
    string from_date = 4;
    string to_date = 5;
}

message ProjectTimelineResponse {
    repeated ProjectTimelineControl projects = 1;
}

message ProjectTimelineControl {
    string project_id = 1;
    string project_name = 2;
    int32 total_tasks = 3;
    int32 completed_on_time = 4;
    int32 overdue_tasks = 5;
    double on_time_rate = 6;
    double avg_delay_days = 7;
    repeated DepartmentDelay departments = 8;
}

message DepartmentDelay {
    string department_id = 1;
    string department_name = 2;
    int32 overdue_tasks = 3;
    double avg_delay_days = 4;
}


message GetTaskTrendsRequest {
    string department_id = 1;
    int32 weeks = 2;
    string project_id = 3;
    string project_ids = 4;
    string from_date = 5;
    string to_date = 6;
    string group_by = 7;
    AnalyticsSummaryScope summary_scope = 8;
}

message TaskTrendsResponse {
    repeated WeeklyTrend trends = 1;
}

message WeeklyTrend {
    string week = 1;
    int32 created = 2;
    int32 completed = 3;
    int32 overdue = 4;
    double completion_rate = 5;
    double on_time_rate = 6;
}


message GetEmployeeProductivityRequest {
    string department_id = 1;
    string from_date = 2;
    string to_date = 3;
    string project_id = 4;
    string project_ids = 5;
}

message EmployeeProductivityResponse {
    repeated EmployeeProductivity employees = 1;
}

message EmployeeProductivity {
    string user_id = 1;
    string full_name = 2;
    string email = 3;
    int32 tasks_completed = 4;
    int32 tasks_overdue = 5;
    double avg_cycle_time = 6;
    double completion_rate = 7;
    double on_time_rate = 8;
}

message GetLaborPlanFactRequest {
    string department_id = 1;
    string from_date = 2;
    string to_date = 3;
    string project_id = 4;
    string project_ids = 5;
    string group_by = 6;
}

message LaborPlanFactResponse {
    repeated LaborPlanFactRow rows = 1;
    double total_planned_hours = 2;
    double total_actual_hours = 3;
    double total_deviation_percent = 4;
    int32 tasks_with_plan = 5;
    int32 tasks_comparable = 6;
    int32 overrun_tasks = 7;
    double avg_actual_per_completed = 8;
}

message LaborPlanFactRow {
    string group_id = 1;
    string group_name = 2;
    double planned_hours = 3;
    double actual_hours = 4;
    int32 task_count = 5;
    double deviation_percent = 6;
    int32 tasks_with_plan = 7;
    int32 tasks_comparable = 8;
    int32 overrun_tasks = 9;
    double avg_actual_per_completed = 10;
}