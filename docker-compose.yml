services:

  auth_db:
    image: postgres:16
    container_name: auth_db
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
        - backend


  redis:
    image: redis:7
    container_name: auth_redis
    ports:
      - "6379:6379"
    networks:
        - backend

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth_service
    depends_on:
      - auth_db
      - redis
    ports:
      - "50051:50051"
    networks:
        - backend
  migrate:
    image: migrate/migrate
    volumes:
      - ./auth-service/migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://auth_user:password@auth_db:5432/auth_db?sslmode=disable",
      "up"
    ]
    depends_on:
      auth_db:
        condition: service_healthy
    networks:
        - backend

volumes:
  auth_db_data:

networks:
    backend:
      driver: bridge