server:
  port: 50051
  timeout: 30s

database:
  host: "auth_db"
  port: 5432
  name: "auth_db"
  user: "auth_user"
  password: "password"
  ssl_mode: "disable"
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime: 30m

redis:
  host: "redis"
  port: 6379
  password: ""
  db: 0

jwt:
  secret: "secret"
  access_ttl: "15m" 
  refresh_ttl: "168h"

logging:
  level: "info"