<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои задачи | ГенСей</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/app.js"></script>
    <link rel="stylesheet" href="/static/tasks.css">
</head>
<body class="dashboard-body">
    <div class="dashboard-container">
        <div class="header">
            <a class="back-link" onclick="window.location.href='/dashboard'">←  На главную</a>
            <h1>Мои задачи</h1>
            <div class="user-info">
                <span class="user-name" id="userName">Загрузка...</span>
                <span class="user-role" id="userRole"></span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>

        <div class="tasks-container">
            <div class="filter-tabs" id="filterTabs">
                <div class="filter-tab active" data-status="">Все</div>
                <div class="filter-tab" data-status="todo">К выполнению</div>
                <div class="filter-tab" data-status="in_progress">В работе</div>
                <div class="filter-tab" data-status="completed">Завершенные</div>
                <div class="filter-tab" data-status="blocked">Заблокированные</div>
            </div>
            
            <div class="tasks-table">
                <div class="table-wrapper" id="tasksContainer">Загрузка...</div>
            </div>
        </div>
    </div>

    <script>
        let currentStatus = '';
        
        function renderTaskRow(t) {
            const statusMap = {
                1: { class: 'status-todo', text: 'К выполнению' },
                2: { class: 'status-progress', text: 'В работе' },
                3: { class: 'status-completed', text: 'Завершена' },
                4: { class: 'status-blocked', text: 'Заблокирована' }
            };
            const status = statusMap[t.status] || { class: '', text: 'Неизвестно' };
            const deadlineStr = t.deadline ? new Date(t.deadline.seconds * 1000).toLocaleDateString() : '—';
            const isDeadlineUrgent = t.deadline && isUrgent(t.deadline);
            
            return `
                <tr>
                   <td>
                        <a href="/task/${t.id}" style="color: #667eea; text-decoration: none; font-weight: 500;">
                            ${escapeHtml(t.title) || 'Без названия'}
                        </a>
                        ${t.description ? `<div class="task-description">${escapeHtml(t.description.substring(0, 80))}${t.description.length > 80 ? '...' : ''}</div>` : ''}
                    </td>
                    <td><a href="#" onclick="goToProject('${t.project_id}'); return false;" class="project-link">К проекту →</a></td>
                    <td><span class="status-badge ${status.class}">${status.text}</span></td>
                    <td class="${isDeadlineUrgent ? 'deadline-urgent' : ''}">${deadlineStr}</td>
                </tr>
            `;
        }
        
        async function loadTasks() {
            const container = document.getElementById('tasksContainer');
            container.innerHTML = '<div class="loading">Загрузка...</div>';
            
            try {
                let url = '/api/tasks/my';
                if (currentStatus) {
                    url += `?status=${currentStatus}`;
                }
                
                const response = await apiRequest(url);
                const data = await response.json();
                const tasks = data.tasks || [];
                
                if (tasks.length === 0) {
                    container.innerHTML = '<div class="empty-state">Нет задач</div>';
                    return;
                }
                
                container.innerHTML = `
                    <table>
                        <thead>
                            <tr><th>Задача</th><th>Проект</th><th>Статус</th><th>Дедлайн</th></tr>
                        </thead>
                        <tbody>
                            ${tasks.map(renderTaskRow).join('')}
                        </tbody>
                    </table>
                `;
            } catch (err) {
                console.error(err);
                container.innerHTML = '<div class="empty-state">Ошибка загрузки задач</div>';
            }
        }
        
        
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentStatus = tab.dataset.status;
                loadTasks();
            });
        });
        
        loadUserInfo();
        loadTasks();
    </script>
</body>
</html>
