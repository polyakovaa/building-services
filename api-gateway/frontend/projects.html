<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проекты | ГенСей</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/projects.css">
    <script src="/static/app.js"></script>

        
</head>
<body class="dashboard-body">
    <div class="dashboard-container">
        <div class="header">
            <h1>Проекты</h1>
            <div class="user-info">
                <span class="user-name" id="userName"></span>
                <span class="user-role" id="userRole"></span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="sidebar">
                <ul class="sidebar-menu">
                    <li class="sidebar-item" data-page="dashboard" onclick="window.location.href='/dashboard'">
                        <span>Главная</span>
                    </li>
                    <li class="sidebar-item active" data-page="projects">
                        <span>Проекты</span>
                    </li>
                    <li class="sidebar-item" data-page="tasks" onclick="window.location.href='/tasks'">
                        <span>Мои задачи</span>
                    </li>
                    <li class="sidebar-item" data-page="calendar" onclick="window.location.href='/calendar'">
                        <span>Календарь</span>
                    </li>
                    <li class="sidebar-item" data-page="analytics" id="analyticsMenuItem" style="display: none;">
                        <span>Аналитика</span>
                    </li>
                    <li class="sidebar-item" data-page="notifications" onclick="window.location.href='/notifications'">
                        <span>Уведомления</span>
                        <span class="notification-badge" id="notifCount"></span>
                    </li>
                    <li class="sidebar-item" data-page="profile" onclick="window.location.href='/profile'">
                        <span>Профиль</span>
                    </li>
                </ul>
            </div>

            <div class="main-content">
                <div class="projects-container">
                    <div class="projects-header">
                        <button class="create-btn" id="createProjectBtn">+ Создать проект</button>
                    </div>
                    
                    <div class="filter-tabs">
                        <div class="filter-tab active" data-status="">Все</div>
                        <div class="filter-tab" data-status="1">Активные</div>
                        <div class="filter-tab" data-status="2">Завершенные</div>
                        <div class="filter-tab" data-status="3">Приостановленные</div>
                        <div class="filter-tab" data-status="4">Отмененные</div>
                    </div>
                    
                    <div class="content-card">
                        <div class="projects-table">
                            <div class="table-wrapper" id="projectsContainer">...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="projectModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Создать проект</h3>
            <input type="hidden" id="projectId">
            <div class="form-group">
                <label>Название проекта</label>
                <input type="text" id="projectName" placeholder="Введите название">
            </div>
            <div class="form-group">
                <label>Описание</label>
                <textarea id="projectDescription" rows="3" placeholder="Введите описание"></textarea>
            </div>
            <div class="form-group">
                <label>Адрес объекта</label>
                <input type="text" id="projectAddress" placeholder="Введите адрес">
            </div>
            <div class="form-group">
                <label>Заказчик</label>
                <input type="text" id="projectCustomer" placeholder="Введите заказчика">
            </div>
            <div class="form-group">
                <label>Дата начала</label>
                <input type="date" id="projectStartDate">
            </div>
            <div class="form-group">
                <label>Дата окончания</label>
                <input type="date" id="projectEndDate">
            </div>
            <div class="modal-buttons">
                <button class="cancel-btn" onclick="closeModal()">Отмена</button>
                <button class="save-btn" onclick="saveProject()">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        let currentUserRole = '';
        let currentStatus = '';
        
        function renderProjectRow(p) {
            return `
                <tr>
                    <td style="padding: 12px 16px;"><a href="/project/${p.id}" class="project-link">${escapeHtml(p.name)}</a></td>
                    <td style="padding: 12px 16px;">${escapeHtml(p.customer || '—')}</td>
                    <td style="padding: 12px 16px;">${escapeHtml(p.object_address || '—')}</td>
                    <td style="padding: 12px 16px;"><span class="status-badge ${getProjectStatusClass(p.status)}">${getProjectStatusText(p.status)}</span></td>
                    <td style="padding: 12px 16px;">${p.end_date ? new Date(p.end_date.seconds * 1000).toLocaleDateString() : '—'}</td>
                </tr>
            `;
        }
        
        async function loadProjects() {
            const container = document.getElementById('projectsContainer');
            container.innerHTML = '<div class="loading">Загрузка...</div>';
            
            try {
                let url = '/api/projects';
                if (currentStatus) {
                    url += `?status=${currentStatus}`;
                }
                
                const response = await apiRequest(url);
                if (!response.ok) {
                    container.innerHTML = '<div class="empty-state">Ошибка загрузки</div>';
                    return;
                }
                
                const data = await response.json();
                const projects = data.projects || (Array.isArray(data) ? data : []);
                
                if (projects.length === 0) {
                    container.innerHTML = '<div class="empty-state">Нет проектов</div>';
                    return;
                }
                
                container.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Название</th>
                                <th>Заказчик</th>
                                <th>Адрес</th>
                                <th>Статус</th>
                                <th>Дедлайн</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${projects.map(renderProjectRow).join('')}
                        </tbody>
                    </table>
                `;
            } catch (err) {
                console.error(err);
                container.innerHTML = '<div class="empty-state">Ошибка загрузки</div>';
            }
        }
        
        function openCreateModal() {
            document.getElementById('modalTitle').innerText = 'Создать проект';
            document.getElementById('projectId').value = '';
            document.getElementById('projectName').value = '';
            document.getElementById('projectDescription').value = '';
            document.getElementById('projectAddress').value = '';
            document.getElementById('projectCustomer').value = '';
            document.getElementById('projectStartDate').value = '';
            document.getElementById('projectEndDate').value = '';
            document.getElementById('projectModal').classList.add('active');
        }
        
        async function saveProject() {
            const id = document.getElementById('projectId').value;
            const data = {
                name: document.getElementById('projectName').value,
                description: document.getElementById('projectDescription').value,
                object_address: document.getElementById('projectAddress').value,
                customer: document.getElementById('projectCustomer').value,
                start_date: document.getElementById('projectStartDate').value ? document.getElementById('projectStartDate').value + 'T00:00:00Z' : null,
                end_date: document.getElementById('projectEndDate').value ? document.getElementById('projectEndDate').value + 'T00:00:00Z' : null
            };
            
            if (!data.name) {
                alert('Введите название проекта');
                return;
            }
            
            try {
                let response;
                if (id) {
                    response = await apiRequest(`/api/projects/${id}`, {
                        method: 'PUT',
                        body: JSON.stringify(data)
                    });
                } else {
                    response = await apiRequest('/api/projects', {
                        method: 'POST',
                        body: JSON.stringify(data)
                    });
                }
                
                if (response.ok) {
                    closeModal();
                    loadProjects();
                    alert(id ? 'Проект обновлен' : 'Проект создан');
                } else {
                    const error = await response.json();
                    alert('Ошибка: ' + (error.error || 'Неизвестная ошибка'));
                }
            } catch (err) {
                alert('Ошибка соединения');
            }
        }
        
        function closeModal() {
            document.getElementById('projectModal').classList.remove('active');
        }
        
        document.getElementById('createProjectBtn').addEventListener('click', openCreateModal);
        
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentStatus = tab.dataset.status;
                loadProjects();
            });
        });
        
        loadUserInfo();
        loadProjects();
    </script>
</body>
</html>
